name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Inject Datadog credentials
        working-directory: amtraker_ingestion
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          jq --arg key "$DD_API_KEY" \
            '.stages.dev.environment_variables.DD_API_KEY = $key' \
            .chalice/config.json > .chalice/config.tmp.json
          mv .chalice/config.tmp.json .chalice/config.json

      - name: Deploy to AWS
        working-directory: amtraker_ingestion
        run: uv run chalice deploy --stage dev

      - name: Attach Lambda layer with native dependencies
        env:
          LAYER_ARN: arn:aws:lambda:us-east-1:081194948292:layer:amtraker-ingestion-deps:1
        run: |
          for func in \
            "amtraker-ingestion-dev-update_gtfs_cache" \
            "amtraker-ingestion-dev-consume_amtraker_api" \
            "amtraker-ingestion-dev-collate_previous_day" \
            "amtraker-ingestion-dev"; do
            aws lambda update-function-configuration \
              --function-name "$func" \
              --layers "$LAYER_ARN" \
              --no-cli-pager > /dev/null 2>&1 && echo "Layer attached to $func" || echo "Skipped $func (not found)"
          done
