name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Inject Datadog credentials
        working-directory: amtraker_ingestion
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
        run: |
          jq --arg key "$DD_API_KEY" \
            '.stages.prod.environment_variables.DD_API_KEY = $key' \
            .chalice/config.json > .chalice/config.tmp.json
          mv .chalice/config.tmp.json .chalice/config.json

      - name: Deploy to AWS
        working-directory: amtraker_ingestion
        run: uv run chalice deploy --stage prod
